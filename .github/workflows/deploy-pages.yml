name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Stage static site
        run: |
          mkdir -p _site/data
          cp index.html app.js styles.css config.js gb.svg _site/
          cp data/strava-activities.json _site/data/
          if [ -f CNAME ]; then cp CNAME _site/; fi

      - name: Debug staged site
        run: |
          echo "Working dir: $(pwd)"
          echo "Staged files:"
          find _site -maxdepth 3 -type f -print | sort
          test -s _site/index.html
          test -s _site/data/strava-activities.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
