name: Update Strava Data

on:
  schedule:
    # Run every Monday at 6 AM UTC
    - cron: '0 6 * * 1'
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Strava data
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          START_DATE: '2026-01-01'
        run: node scripts/fetch-strava-data.js

      - name: Create Pull Request for data update
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Update Strava activities data"
          branch: "bot/update-strava-data"
          delete-branch: true
          title: "Update Strava activities data"
          body: "Automated Strava data refresh."
          add-paths: |
            data/strava-activities.json
